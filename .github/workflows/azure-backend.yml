name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - "api/**"
      - "Dockerfile"
      - ".github/workflows/azure-backend.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: empowerwork-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push container image
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.AZURE_CONTAINER_REGISTRY }}/empowerwork-api:${{ github.sha }} .
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/empowerwork-api:${{ github.sha }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.AZURE_CONTAINER_REGISTRY }}/empowerwork-api:${{ github.sha }}
