# EmpowerWork event stack (thesis demo): Kafka + Redis + Kafka UI + Spark
#
# Core:
#   docker compose -f docker-compose.events.yml up -d
#
# Run Spark analytics batch (writes data/reports/latest.json):
#   docker compose -f docker-compose.events.yml run --rm spark-analytics
#
# Optional Spark cluster UI (master + worker) for thesis demo:
#   docker compose -f docker-compose.events.yml --profile spark-cluster up -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kafka:
    image: apache/kafka:3.8.1
    hostname: kafka
    container_name: empowerwork-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: empowerwork
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      - kafka

  # One-shot PySpark job (local[*] inside container — no Java install on host)
  spark-analytics:
    profiles: ["spark"]
    image: apache/spark:3.5.3
    volumes:
      - .:/opt/spark-app
    working_dir: /opt/spark-app
    environment:
      USE_SPARK: "true"
      SPARK_MASTER: local[*]
      ANALYTICS_DATA_PATH: /opt/spark-app/data/lake
      SPARK_REPORT_PATH: /opt/spark-app/data/reports/latest.json
      PYTHONPATH: /opt/spark-app
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - local[*]
      - backend/spark_jobs/analytics_daily.py

  spark-master:
    profiles: ["spark-cluster"]
    image: apache/spark:3.5.3
    hostname: spark-master
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - ./data:/opt/spark/work-dir/data

  spark-worker:
    profiles: ["spark-cluster"]
    image: apache/spark:3.5.3
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/spark/work-dir/data

volumes:
  redis_data:
